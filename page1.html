<script>
  // Function to proceed to checkout (make it global for onclick handler and delegation)
  window.proceedToCheckout = function() {
    // Check if Tilda cart function is available
    if (typeof tcart__addProduct !== 'function') {
      console.error('Tilda cart function not found. Ensure the cart block is present and loaded');
      showNotification('Ошибка корзины. Обновите страницу.');
      return;
    }

    // Check if any products are selected
    if (Object.keys(userSelections).length === 0) {
      showNotification('Пожалуйста, выберите хотя бы один элемент комплекта');
      return;
    }

    try {
      // Add each selected product to cart
      Object.keys(userSelections).forEach(productKey => {
        const selection = userSelections[productKey];
        if (selection && selection.product && selection.size) {
          const product = selection.product;
          const size = selection.size;

          // Find price for selected size
          const sizeObj = product.sizes.find(s => s.size === size);
          const price = sizeObj ? sizeObj.price : 0;
          const cartProduct = buildTildaCartProduct(product, size, sizeObj, price);

          tcart__addProduct(cartProduct);
        }
      });

      // Show success message
      // showNotification('Выбранные товары добавлены в корзину!');

      // Optional: Open cart automatically after short delay
      setTimeout(() => {
        if (typeof tcart__open === 'function') {
          tcart__open();
        }
      }, 1000);

    } catch (error) {
      console.error('Error adding products to cart:', error);
      showNotification('Ошибка при добавлении в корзину');
    }
  };

  function handleProductsLoadError(error) {
    console.error('Каталог товаров недоступен:', error);
    showNotification('Каталог товаров временно недоступен');
    return { pillows: { items: [] }, blankets: { items: [] }, mattresses: { items: [] } };
  }

  const TILDA_STORE_CATALOGS = {
    pillows: [
      { recid: '1488287021', storepartuid: '738568870771' },
      { recid: '2129677441', storepartuid: '866245902672' }
    ],
    blankets: [
      { recid: '595008143', storepartuid: '774656928841' },
      { recid: '2129686241', storepartuid: '872333661362' }
    ],
    mattresses: [
      { recid: '1488291171', storepartuid: '398417292891' },
      { recid: '2129708641', storepartuid: '337586719402' }
    ]
  };

  function parseTildaJson(value, fallback) {
    if (!value) return fallback;
    if (Array.isArray(value)) return value;
    try {
      return JSON.parse(value);
    } catch (error) {
      console.warn('Не удалось разобрать данные Tilda:', value, error);
      return fallback;
    }
  }

  function parseTildaPrice(value) {
    if (typeof value === 'number') return value;
    if (!value) return 0;
    return Number(String(value).replace(/\s/g, '').replace(',', '.')) || 0;
  }

  function getTildaOptionVariant(edition, size) {
    return edition['Размер'] || size;
  }

  function getFirstTildaGalleryImage(product) {
    const gallery = parseTildaJson(product.gallery, []);
    const firstImage = gallery.find(item => item && item.img);
    return firstImage ? firstImage.img : '';
  }

  function sortSizes(sizes) {
    return sizes.sort((a, b) => {
      const aNumbers = a.match(/\d+/g)?.map(Number) || [];
      const bNumbers = b.match(/\d+/g)?.map(Number) || [];
      for (let i = 0; i < Math.max(aNumbers.length, bNumbers.length); i++) {
        const diff = (aNumbers[i] || 0) - (bNumbers[i] || 0);
        if (diff !== 0) return diff;
      }
      return a.localeCompare(b, 'ru');
    });
  }

  function buildTildaCartProduct(product, size, sizeObj, price) {
    const tilda = sizeObj?.tilda;
    if (tilda) {
      return {
        name: tilda.name,
        price: tilda.price || price,
        img: tilda.img || product.picture,
        recid: tilda.recid,
        lid: tilda.lid,
        uid: tilda.uid,
        pack_label: tilda.pack_label,
        pack_m: tilda.pack_m,
        pack_x: tilda.pack_x,
        pack_y: tilda.pack_y,
        pack_z: tilda.pack_z,
        part_uids: tilda.part_uids,
        gen_uid: tilda.gen_uid,
        url: tilda.url,
        options: tilda.options,
        inv: tilda.inv
      };
    }

    return {
      name: generateDisplayName(product.name, size),
      price: price,
      sku: generateSkuWithSize(product.sku, size),
      img: product.picture,
      externalid: sizeObj?.externalCode
    };
  }

  async function enrichProductsWithTildaMetadata(products) {
    const catalogEntries = Object.entries(TILDA_STORE_CATALOGS);

    await Promise.all(catalogEntries.map(async ([productType, catalogs]) => {
      const items = products[productType]?.items || [];
      if (!items.length) return;

      const tildaByExternalCode = new Map();

      for (const catalog of catalogs) {
        const response = await fetch(
          `https://store.tildaapi.com/api/getproductslist/?getoptions=true&getparts=true&recid=${catalog.recid}&size=100&slice=1&storepartuid=${catalog.storepartuid}`
        );
        if (!response.ok) throw new Error(`Tilda ${productType}: HTTP ${response.status}`);

        const tildaCatalog = await response.json();

        (tildaCatalog.products || []).forEach(tildaProduct => {
          const partUids = parseTildaJson(tildaProduct.partuids, []);
          const image = getFirstTildaGalleryImage(tildaProduct);

          (tildaProduct.editions || []).forEach(edition => {
            if (!edition.externalid) return;

            tildaByExternalCode.set(edition.externalid, {
              name: tildaProduct.title,
              price: parseTildaPrice(edition.price || tildaProduct.price),
              img: edition.img || image,
              recid: catalog.recid,
              lid: String(edition.uid),
              uid: String(edition.uid),
              pack_label: tildaProduct.pack_label,
              pack_m: String(tildaProduct.pack_m || ''),
              pack_x: String(tildaProduct.pack_x || ''),
              pack_y: String(tildaProduct.pack_y || ''),
              pack_z: String(tildaProduct.pack_z || ''),
              part_uids: partUids.map(String),
              gen_uid: String(tildaProduct.uid),
              url: tildaProduct.url,
              options: [{ option: 'Размер', variant: getTildaOptionVariant(edition, ''), price: 0 }],
              inv: parseInt(edition.quantity, 10) || undefined
            });
          });
        });
      }

      items.forEach(product => {
        (product.sizes || []).forEach(sizeObj => {
          const tilda = tildaByExternalCode.get(sizeObj.externalCode);
          if (tilda) {
            sizeObj.tilda = {
              ...tilda,
              options: [{ option: 'Размер', variant: getTildaOptionVariant(tilda, sizeObj.size), price: 0 }]
            };
          }
        });
      });
    }));
  }

  document.addEventListener('DOMContentLoaded', async function() {
    let products;
    try {
      const response = await fetch('https://konstruktor-palicadnik.amvera.io/getProducts');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      products = await response.json();
      try {
        await enrichProductsWithTildaMetadata(products);
      } catch (error) {
        console.warn('Не удалось загрузить метаданные товаров Tilda:', error);
      }
    } catch (error) {
      products = handleProductsLoadError(error);
    }

    // Current selections
    const defaultSelection = (category) => {
      const product = products[category].items[0];
      return { product, size: product?.sizes?.[0]?.size };
    };
    let currentSelections = {
      pillow1: defaultSelection('pillows'),
      pillow2: defaultSelection('pillows'),
      pillow3: defaultSelection('pillows'),
      pillow4: defaultSelection('pillows'),
      blanket1: defaultSelection('blankets'),
      blanket2: defaultSelection('blankets'),
      mattress: defaultSelection('mattresses')
    };
    
    // Initial selections - to reset to default values (TOPLENOE MOLOKO)
    let initialSelections = JSON.parse(JSON.stringify(currentSelections));
    
    // User selections - only items that user has explicitly selected
    window.userSelections = {};

// Переменная для хранения текущей конфигурации
    let currentConfig = '2-1';

    window.beddingState = {
      config: '2-1' // Конфигурация по умолчанию
    };
// Функция переключения конфигурации
    function switchConfig(config) {
      // Hide continue text when switching config (step 0)
      hideContinueText();

      // 1. Удаляем все активные классы с body
      document.body.classList.remove('active-2-1', 'active-2-2', 'active-4-1', 'active-4-2');

      // 2. Добавляем новый активный класс
      document.body.classList.add('active-' + config);

      // 3. Обновляем состояние кнопок
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);
      document.querySelectorAll('.config-btn').forEach(btn => {
        const btnCount = parseInt(btn.getAttribute('data-count'));
        const isPillowBtn = btn.classList.contains('pillow-count-btn');
        const isBlanketBtn = btn.classList.contains('blanket-count-btn');
        
        if (isPillowBtn) {
          // Для кнопок подушек проверяем data-count
          if (btnCount === pillowsCount) {
            btn.classList.add('selected');
          } else {
            btn.classList.remove('selected');
          }
        } else if (isBlanketBtn) {
          // Для кнопок одеял проверяем data-count
          if (btnCount === blanketsCount) {
            btn.classList.add('selected');
          } else {
            btn.classList.remove('selected');
          }
        } else {
          btn.classList.remove('selected');
        }
      });

      // 4. Сохраняем текущую конфигурацию
      window.beddingState.config = config;
      currentConfig = config;

      // 5. Обновляем видимость элементов
      updateElementVisibility(config);

      // 6. Даем время на обновление DOM, затем обновляем изображения
      setTimeout(() => {
        updateImagesForConfig(config);
      }, 50);

      // 7. Показываем уведомление
      // showNotification(`Выбрана конфигурация: ${config.replace('-', '/')}`);
    }

// Функция инициализации конфигурации
    function initConfiguration() {
      // Initialize selected counts
      window.selectedPillows = 2; // Default value
      window.selectedBlankets = 1; // Default value
      
      // Add event listeners for pillow count buttons
      document.querySelectorAll('.pillow-count-btn').forEach(btn => {
        // Click event
        btn.addEventListener('click', function() {
          // Remove selected class from all pillow buttons
          document.querySelectorAll('.pillow-count-btn').forEach(b => b.classList.remove('selected'));
          // Add selected class to clicked button
          this.classList.add('selected');
          // Update selected pillow count
          window.selectedPillows = parseInt(this.getAttribute('data-count'));
          // Update configuration immediately
          updateConfiguration();
        });

        // Add active state on mouse down for visual feedback
        btn.addEventListener('mousedown', function() {
          this.classList.add('active');
        });

        // Remove active state on mouse up
        btn.addEventListener('mouseup', function() {
          this.classList.remove('active');
        });

        // Remove active state when mouse leaves button
        btn.addEventListener('mouseleave', function() {
          this.classList.remove('active');
        });
      });

      // Add event listeners for blanket count buttons
      document.querySelectorAll('.blanket-count-btn').forEach(btn => {
        // Click event
        btn.addEventListener('click', function() {
          // Remove selected class from all blanket buttons
          document.querySelectorAll('.blanket-count-btn').forEach(b => b.classList.remove('selected'));
          // Add selected class to clicked button
          this.classList.add('selected');
          // Update selected blanket count
          window.selectedBlankets = parseInt(this.getAttribute('data-count'));
          // Update configuration immediately
          updateConfiguration();
        });

        // Add active state on mouse down for visual feedback
        btn.addEventListener('mousedown', function() {
          this.classList.add('active');
        });

        // Remove active state on mouse up
        btn.addEventListener('mouseup', function() {
          this.classList.remove('active');
        });

        // Remove active state when mouse leaves button
        btn.addEventListener('mouseleave', function() {
          this.classList.remove('active');
        });
      });

      // Add event listener for next button
      document.getElementById('next-btn').addEventListener('click', function() {
        // Check if we're on step 3 (color selection) to show order summary
        const step3Indicator = document.getElementById('step3-indicator');
        if (step3Indicator.style.display === 'block') {
          // Show order summary (step 4)
          showOrderSummary();
        } else {
          // Hide configuration section
          document.getElementById('config-sections').style.display = 'none';
          
          // Show the hidden elements
          document.getElementById('customization-scroll-container').style.display = 'block';
          document.querySelector('.back-btn').style.display = 'block';
          
          // Reset step content to initial state
          document.getElementById('step1-indicator').innerHTML = '1. НАЖМИТЕ НА ПЛЮС НА ЛЮБОМ ТОВАРЕ';
          const step2Indicator = document.getElementById('step2-indicator');

          const step2Indicator = document.getElementById('step2-indicator');
          step2Indicator.innerHTML = '2. ВЫБЕРИТЕ РАЗМЕР (СМ)';

    // New function to update configuration based on selected counts
    function updateConfiguration() {
      const config = window.selectedPillows + '-' + window.selectedBlankets;
      switchConfig(config);

    // DOM elements
    const paletteGrid = document.getElementById('palette-grid');
    let currentCustomizing = null;
    let isFirstColorSelected = false;

    function updateElementVisibility(config) {
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);

      // Обновляем видимость элементов с классами pillow1, pillow2 и т.д.
      for (let i = 1; i <= 4; i++) {
        const element = document.querySelector(`.pillow${i}`);

            element.style.display = 'block';

            element.style.display = 'none';

        }
      }

      for (let i = 1; i <= 2; i++) {
        const element = document.querySelector(`.blanket${i}`);
        if (element) {
          if (i <= blanketsCount) {
            element.style.display = 'block';
          } else {
            element.style.display = 'none';
          }
        }
      }

    function initializeImages() {
      updateImagesForConfig(currentConfig);
    }

    // Initialize the customizer
    function initCustomizer() {
      const buttons = [
        '.pillow1-btn', '.pillow2-btn', '.pillow3-btn', '.pillow4-btn',
        '.blanket1-btn', '.blanket2-btn', '.mattress-btn'
      ];

      buttons.forEach(selector => {
        const btn = document.querySelector(selector);
        if (!btn) {
          console.warn(`Кнопка не найдена: ${selector}`);
        }
      });

      initConfiguration();

      // Применяем дефолтную конфигурацию grp21 без подсветки кнопок-счётчиков
      document.body.classList.add('active-2-1');
      updateElementVisibility('2-1');
      setTimeout(() => updateImagesForConfig('2-1'), 50);

      window.addEventListener('click', function(event) {
        // 3. Ищем кнопку в пути события
        let targetBtn = event.target;
        let foundButton = false;

        // Проверяем сам элемент и его родителей
        while (targetBtn && targetBtn !== document.body) {
          if (targetBtn.classList) {
            // Проверяем все классы элемента
            const classList = Array.from(targetBtn.classList);

            // Ищем кнопку по классу
            if (classList.some(cls => cls.includes('-btn'))) {
              foundButton = targetBtn;
              break;
            }
          }
          targetBtn = targetBtn.parentElement;
        }

        if (!foundButton) return;

        // Проверяем, не является ли это кнопкой "Назад" или другими кнопками, которые не нужно обрабатывать
        if (foundButton.classList.contains('back-btn') ||
            foundButton.classList.contains('config-btn') ||
            foundButton.classList.contains('next-btn') ||
            foundButton.classList.contains('pillow-count-btn') ||
            foundButton.classList.contains('blanket-count-btn')) {
          // Это одна из специальных кнопок, не обрабатываем её здесь
          return;
        }

        // 4. Определяем тип кнопки
        const btnClasses = Array.from(foundButton.classList);
        let elementId = '';

        if (btnClasses.some(c => c.includes('pillow1-btn'))) elementId = 'pillow1';
        else if (btnClasses.some(c => c.includes('pillow2-btn'))) elementId = 'pillow2';
        else if (btnClasses.some(c => c.includes('pillow3-btn'))) elementId = 'pillow3';
        else if (btnClasses.some(c => c.includes('pillow4-btn'))) elementId = 'pillow4';
        else if (btnClasses.some(c => c.includes('blanket1-btn'))) elementId = 'blanket1';
        else if (btnClasses.some(c => c.includes('blanket2-btn'))) elementId = 'blanket2';
        else if (btnClasses.some(c => c.includes('mattress-btn'))) elementId = 'mattress';

        if (elementId) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          
          // 5. Удаляем класс selected у всех кнопок
          document.querySelectorAll('.pillow1-btn, .pillow2-btn, .pillow3-btn, .pillow4-btn, .blanket1-btn, .blanket2-btn, .mattress-btn').forEach(btn => {
            btn.classList.remove('selected');
          });
          
          // 6. Добавляем класс selected к текущей кнопке
          foundButton.classList.add('selected');
          
          // 7. Устанавливаем элемент для кастомизации
          currentCustomizing = elementId;
          
          // 8. Показываем уведомление для подтверждения
          // showNotification(`Выбрано: ${elementId}`);
          
          // 9. Очищаем выделение цветов
          const paletteGridElement = document.getElementById('palette-grid');
          if (paletteGridElement) {
            paletteGridElement.querySelectorAll('.color-swatch').forEach(swatch => {
              swatch.classList.remove('selected');
            });
          }
          
          // 10. Обновляем текст первого шага с названием продукта
          const productName = elementId.includes('pillow') ? 'НАВОЛОЧКА' :
                             elementId.includes('blanket') ? 'ПОДОДЕЯЛЬНИК' : 'ПРОСТЫНЯ';
          const step1Indicator = document.getElementById('step1-indicator');
          step1Indicator.innerHTML = `1. НАЖМИТЕ НА ПЛЮС НА ЛЮБОМ ТОВАРЕ: <span class="product-name">${productName}</span>`;
          
          // 11. Показываем и обновляем текст второго шага
          const step2Indicator = document.getElementById('step2-indicator');
          step2Indicator.innerHTML = '2. ВЫБЕРИТЕ РАЗМЕР (СМ)';
          step2Indicator.style.display = 'block';

          // Прячем палитру и сбрасываем шаг 3 — появятся только после выбора размера
          document.getElementById('palette-grid').style.display = 'none';
          const step3Indicator = document.getElementById('step3-indicator');
          step3Indicator.innerHTML = '3. ВЫБЕРИТЕ ЦВЕТ';
          step3Indicator.style.display = 'none';

          // 12. Загружаем размеры для элемента
          showProductCustomization(elementId,
                  elementId.includes('pillow') ? 'Наволочки' :
                          elementId.includes('blanket') ? 'Пододеяльник' : 'Простыня');
        }
      }, true); // Используем capture phase (true)

      // Initialize displays
      updateProductImages();

      // Load all swatches initially
      loadSwatches();

      // Function to proceed to checkout (already defined globally)
      // Обработчик привязан через onclick="window.proceedToCheckout()" в HTML

      setTimeout(() => {
        initializeImages();
      }, 500);
    }

    // Функция для отображения кастомизации продукта
    function showProductCustomization(elementId, productName) {
      currentCustomizing = elementId;

      // Определяем тип продукта для размеров
      let productType;
      if (elementId.includes('pillow')) {
        productType = 'pillows';
      } else if (elementId.includes('blanket')) {
        productType = 'blankets';
      } else if (elementId === 'mattress') {
        productType = 'mattresses';
      }

      // Показываем размеры ТОЛЬКО если есть соответствующая секция
      const sizeSection = document.getElementById('size-section');
      if (sizeSection) {
        showSizeOptions(productType, productName, elementId);
      }

      // Загружаем палитру цветов
      loadSwatches();
    }

    // Функция для отображения кнопок размеров
    function showSizeOptions(productType, productName, elementId) {
      // Скрываем все секции размеров
      const sizeSection = document.getElementById('size-section');
      if (!sizeSection) return;

      // Очищаем контейнер
      sizeSection.innerHTML = '';

      // Получаем размеры для данного продукта из JSON
      let sizes = [];

      sizes = [
        ...new Set(
          (products[productType]?.items || []).flatMap(product =>
            (product.sizes || []).map(size => size.size)
          )
        )
      ];
      sizes = sortSizes(sizes);

      if (!sizes || sizes.length === 0) {
        return;
      }

      // Создаем контейнер для кнопок
      const buttonsContainer = document.createElement('div');
      buttonsContainer.className = 'size-buttons-container';

      // Создаем кнопки для каждого размера
      sizes.forEach(size => {
        const button = document.createElement('button');
        button.className = 'size-button';
        button.textContent = size;
        button.dataset.size = size;
        button.dataset.product = productType;

        // НЕ добавляем класс selected по умолчанию - кнопки должны быть прозрачными
        // Класс selected добавится только при клике

        button.addEventListener('click', function() {
          // Удаляем класс selected у всех кнопок
          buttonsContainer.querySelectorAll('.size-button').forEach(btn => {
            btn.classList.remove('selected');
          });

          // Добавляем класс selected текущей кнопке
          this.classList.add('selected');

          // Сохраняем выбранный размер
          currentSelections[elementId].size = size;

          // Показываем уведомление
          // showNotification(`Размер выбран: ${size}`);
          
          // Показываем и обновляем текст третьего шага
          const step3Indicator = document.getElementById('step3-indicator');
          step3Indicator.innerHTML = '3. ВЫБЕРИТЕ ЦВЕТ';
          step3Indicator.style.display = 'block';
          
          // Показываем палитру цветов
          document.getElementById('palette-grid').style.display = 'grid';
          
          // Загружаем палитру цветов с фильтрацией по размеру
          loadSwatches();
          
        });

        buttonsContainer.appendChild(button);
      });

      sizeSection.appendChild(buttonsContainer);

      // Показываем секцию
      sizeSection.style.display = 'block';
    }

    // Reset to initial selections (default values)
    function resetToInitial(updateImages) {
      currentSelections = JSON.parse(JSON.stringify(initialSelections));
      userSelections = {};
      if (updateImages) {
        updateProductImages();
      }
    }

    // Update product images based on current selections
    function updateProductImages() {
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      Object.keys(currentSelections).forEach(key => {
        const elementId = key + '-img-' + groupSuffix;
        const container = document.querySelector('.' + elementId);
        if (container && currentSelections[key].product) {
          const img = container.querySelector('img');
          if (img) {
            img.src = getImageUrlForElement(currentSelections[key].product, key, currentConfig);
          }
        }
      });
    }

    // Load swatches for current selection
    function loadSwatches() {
      paletteGrid.innerHTML = '';

      if (!currentCustomizing) {
        return;
      }

      const productType = currentCustomizing.includes('pillow') ? 'pillows' :
              currentCustomizing.includes('blanket') ? 'blankets' : 'mattresses';

      // Проверяем существование данных
      if (!products[productType]) {
        console.error(`Тип продукта не найден: ${productType}`);
        paletteGrid.innerHTML = '<p>Нет данных для этого типа</p>';
        return;
      }

      // Получаем выбранный размер для текущего элемента
      const selectedSize = currentSelections[currentCustomizing]?.size;

      const allProducts = products[productType].items || [];

      // Фильтруем продукты по выбранному размеру, если размер выбран
      let filteredProducts = allProducts;
      if (selectedSize) {
        filteredProducts = allProducts.filter(product => {
          return product.sizes && product.sizes.some(sizeObj => sizeObj.size === selectedSize);
        });
      }

      if (filteredProducts.length === 0) {
        paletteGrid.innerHTML = '<p>Нет доступных вариантов</p>';
        return;
      }

      filteredProducts.forEach((product, index) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';

        // Используем picture для превью цвета
        if (product.picture) {
          swatch.style.backgroundImage = `url('${product.picture}')`;
        } else {
          console.warn(`Нет картинки для продукта: ${product.name}`);
          swatch.style.backgroundColor = '#ccc'; // Запасной цвет
        }

        swatch.title = product.name;

        // НЕ добавляем класс selected автоматически - выбор происходит только при явном нажатии
        // if (currentSelections[currentCustomizing].product &&
        //         currentSelections[currentCustomizing].product.id === product.id) {
        //   swatch.classList.add('selected');
        // }

        swatch.addEventListener('click', () => {
          // Удаляем класс selected у всех образцов
          paletteGrid.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.remove('selected');
          });
          
          // Добавляем класс selected к текущему образцу
          swatch.classList.add('selected');
          
          selectProduct(product);
        });

        paletteGrid.appendChild(swatch);
      });

    }

    // Select a product
    function selectProduct(product) {
      if (!currentCustomizing) return;

      const currentConfig = window.beddingState?.config || '2-1';

      // 1. Получаем новый URL
      const newImageUrl = getImageUrlForElement(product, currentCustomizing, currentConfig);
      if (!newImageUrl) {
        console.error('Не удалось получить URL');
        return;
      }

      // 2. Находим ВСЕ элементы, связанные с этим объектом (с учетом конфигурации)
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      const selectors = [
        '.' + currentCustomizing + '-img-' + groupSuffix + ' img', // Основной контейнер с группой
        'img[class*="' + currentCustomizing + '-img-' + groupSuffix + '"]', // Прямо тег img с классом и группой
        '[data-original*="' + currentCustomizing + '"]', // По data-original (без группы, так как это атрибут)
        'img[src*="' + currentCustomizing + '"]' // По src (без группы, так как это атрибут)
      ];

      let updatedCount = 0;
      selectors.forEach(selector => {
        const elements = document.querySelectorAll(selector);
        elements.forEach(el => {
          // Меняем src
          if (el.src !== newImageUrl) {
            el.src = newImageUrl;
            updatedCount++;
          }
          // Если есть data-original (для lazy load) - меняем и его
          if (el.dataset.original) {
            el.dataset.original = newImageUrl;
          }
          // Принудительно отключаем lazy loading для надёжности
          el.loading = 'eager';
        });
      });

      // 3. Специальный поиск по data-original (часто используется в Tilda)
      const allImages = document.querySelectorAll('img[data-original]');
      allImages.forEach(img => {
        if (img.dataset.original.includes(currentCustomizing.replace(/\d+$/, ''))) {
          img.src = newImageUrl;
          img.dataset.original = newImageUrl;
          updatedCount++;
        }
      });

      if (updatedCount > 0) {
        currentSelections[currentCustomizing].product = product;
        // Also update user selections
        userSelections[currentCustomizing] = {
          product: product,
          size: currentSelections[currentCustomizing].size
        };
        // showNotification('Цвет выбран! Обновлено элементов: ' + updatedCount);
        // Показываем текст и меняем кнопку после первого выбора цвета
        showContinueTextAndUpdateButton();
        
        // 4. Обновляем индикатор шага 3 с информацией о выбранном цвете
        const step3Indicator = document.getElementById('step3-indicator');
        const selectedSize = currentSelections[currentCustomizing]?.size;
        const sizeObj = product.sizes.find(s => s.size === selectedSize);
        const price = sizeObj ? sizeObj.price : (product.sizes.length > 0 ? product.sizes[0].price : 0);
        
        // Форматируем цену с точкой для тысяч
        const formattedPrice = Math.floor(price).toLocaleString('ru-RU').replace(/\s/g, '.');
        
        step3Indicator.innerHTML = `3. ВЫБЕРИТЕ ЦВЕТ: <span class="product-name">${product.name} ${formattedPrice} ₽</span>`;
      } else {
        console.error('Не найдено ни одного изображения для обновления');
      }
    }

// Функция для получения правильного kind
    function getKindForElement(elementName, config) {
      // Разбираем конфигурацию на количество подушек и одеял
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);

      // Для pillow1, pillow2, pillow3, pillow4
      if (elementName.startsWith('pillow')) {
        const pillowNum = parseInt(elementName.replace('pillow', ''));

        if (pillowsCount === 2) {
          // Для конфигураций с 2 подушками
          if (pillowNum === 1) return '1/2';
          if (pillowNum === 2) return '2/2';
        } else if (pillowsCount === 4) {
          // Для конфигураций с 4 подушками
          if (pillowNum <= 4) return `${pillowNum}/4`;
        }
      }
      // Для blanket1, blanket2
      else if (elementName.startsWith('blanket')) {
        const blanketNum = parseInt(elementName.replace('blanket', ''));

        if (blanketsCount === 1) {
          // Одно одеяло в конфигурации
          if (pillowsCount === 2) {
            return '1/1/2'; // Для 2-1 конфигурации
          } else if (pillowsCount === 4) {
            return '1/1/4'; // Для 4-1 конфигурации
          }
        } else if (blanketsCount === 2) {
          // Два одеяла в конфигурации
          if (pillowsCount === 2) {
            return blanketNum === 1 ? '1/2/2' : '2/2/2'; // Для 2-2 конфигурации
          } else if (pillowsCount === 4) {
            return blanketNum === 1 ? '1/2/4' : '2/2/4'; // Для 4-2 конфигурации
          }
        }
      }
      // Для mattress
      else if (elementName === 'mattress') {
        // Для простыней формат kind: y/z, где y - количество одеял, z - количество подушек
        return `${blanketsCount}/${pillowsCount}`;
      }

      console.warn(`Неизвестный kind для ${elementName} в конфигурации ${config}`);
      return '1/2';
    }

// Обновленная функция getImageUrlForElement
    function getImageUrlForElement(product, elementName, config) {
      if (!product || !product.image || !Array.isArray(product.image)) {
        console.error('Продукт или изображения отсутствуют:', product);
        return '';
      }

      const kindToFind = getKindForElement(elementName, config);
      // Сначала ищем точное совпадение
      let imageObj = product.image.find(img => img.kind === kindToFind);

      if (imageObj) {
        return imageObj.url;
      }

      console.warn(`Точное совпадение не найдено. Доступные kind:`, product.image.map(img => img.kind));

      // Если не нашли, ищем по логике
      if (elementName.includes('pillow')) {
        const [pillowsCount] = config.split('-').map(Number);

        // Для 2 подушек
        if (pillowsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            return imageObj.url;
          }
        }
        // Для 4 подушек
        else if (pillowsCount === 4) {
          imageObj = product.image.find(img => img.kind.includes('/4'));
          if (imageObj) {
            return imageObj.url;
          }
        }
      }
      else if (elementName.includes('blanket')) {
        const [, blanketsCount] = config.split('-').map(Number);

        // Для 1 одеяла
        if (blanketsCount === 1) {
          imageObj = product.image.find(img => img.kind === '1/1/2' || img.kind.includes('/2'));
          if (imageObj) {
            return imageObj.url;
          }
        }
        // Для 2 одеял
        else if (blanketsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            return imageObj.url;
          }
        }
      }
      else if (elementName === 'mattress') {
        // Для простыни ищем по формату y/z, где y - количество одеял, z - количество подушек
        const [pillowsCount, blanketsCount] = config.split('-').map(Number);
        const mattressKind = `${blanketsCount}/${pillowsCount}`;
        imageObj = product.image.find(img => img.kind === mattressKind);
        if (imageObj) {
          return imageObj.url;
        }

        // Если не нашли точное совпадение, ищем по количеству подушек
        if (pillowsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            return imageObj.url;
          }
        } else if (pillowsCount === 4) {
          imageObj = product.image.find(img => img.kind.includes('/4'));
          if (imageObj) {
            return imageObj.url;
          }
        }
      }

      // В крайнем случае берем первое изображение
      if (product.image.length > 0) {
        imageObj = product.image[0];
        console.warn(`Используем первое доступное изображение: ${imageObj.kind}`);
        return imageObj.url;
      }

      console.error('Не удалось найти подходящее изображение');
      return '';
    }

    // Добавим функцию обновления всех изображений при смене конфигурации
    function updateImagesForConfig(config) {
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);

      // Обновляем видимые подушки
      for (let i = 1; i <= 4; i++) {
        const elementName = `pillow${i}`;
        const selection = currentSelections[elementName];

        if (i <= pillowsCount && selection && selection.product) {
          updateSingleImage(elementName, selection.product, config);
        }
      }

      // Обновляем видимые одеяла
      for (let i = 1; i <= 2; i++) {
        const elementName = `blanket${i}`;
        const selection = currentSelections[elementName];

        if (i <= blanketsCount && selection && selection.product) {
          updateSingleImage(elementName, selection.product, config);
        }
      }

      // Обновляем простыню
      if (currentSelections.mattress && currentSelections.mattress.product) {
        updateSingleImage('mattress', currentSelections.mattress.product, config);
      }
    }


// Упрощенная и исправленная функция updateSingleImage для работы с классами Tilda
    function updateSingleImage(elementName, product, config) {
      // В Tilda классы: pillow1-img-grpXX, pillow2-img-grpXX, blanket1-img-grpXX, blanket2-img-grpXX, mattress-img-grpXX
      // Ищем элемент по точному классу с учетом конфигурации
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      const imgElement = document.querySelector(`.${elementName}-img-${groupSuffix}`);

      if (!imgElement) {
        console.error(`Элемент с классом .${elementName}-img-${groupSuffix} не найден!`);

        // Для отладки: выведем все элементы с похожими классами
        const allElements = document.querySelectorAll('[class]');
        const relevantElements = Array.from(allElements).filter(el => {
          return el.className.includes(elementName.replace(/\d+$/, '') + '-img') ||
                  el.className.includes(elementName + '-img');
        });

        return;
      }

      const imageUrl = getImageUrlForElement(product, elementName, config);

      if (imageUrl && imageUrl !== imgElement.src) {
        // Добавляем анимацию перехода
        imgElement.style.transition = 'opacity 0.3s';
        imgElement.style.opacity = '0.7';

        // Создаем новое изображение для предзагрузки
        const newImg = new Image();
        newImg.onload = function() {
          imgElement.src = imageUrl;
          setTimeout(() => {
            imgElement.style.opacity = '1';
          }, 50);
        };

        newImg.onerror = function() {
          console.error(`Ошибка загрузки изображения для ${elementName}:`, imageUrl);
          imgElement.style.opacity = '1';

          // Пробуем загрузить запасной вариант
          const fallbackUrl = getFallbackImageUrl(product, elementName, config);
          if (fallbackUrl && fallbackUrl !== imageUrl) {
            imgElement.src = fallbackUrl;
          }
        };

        newImg.src = imageUrl;
      } else if (!imageUrl) {
        console.error(`Не удалось получить URL для ${elementName}`);
      }
    }

    // Функция для получения запасного изображения
    function getFallbackImageUrl(product, elementName, config) {
      if (!product || !product.image || !Array.isArray(product.image)) return '';

      // Ищем любое доступное изображение
      const availableImage = product.image.find(img => img.url && !img.url.includes('_.png'));

      if (availableImage) {
        return availableImage.url;
      }

      // Берем первое изображение, даже если это заглушка
      if (product.image.length > 0 && product.image[0].url) {
        return product.image[0].url;
      }

      return '';
    }


    // Show notification
    window.showNotification = function(message) {
      const el = document.getElementById('notification');
      if (el) {
        el.textContent = message;
        el.classList.add('show');

        setTimeout(() => {
          el.classList.remove('show');
        }, 3000);
      }
    };

    // Show continue text and update button after first color selection
    window.showContinueTextAndUpdateButton = function() {
      if (isFirstColorSelected) return;
      
      const continueText = document.getElementById('continue-text');
      const nextBtn = document.getElementById('next-btn');
      
      if (continueText) {
        continueText.style.display = 'block';
      }
      
      if (nextBtn) {
        nextBtn.textContent = 'ПОСМОТРЕТЬ СОСТАВ ЗАКАЗА';
      }
      
      isFirstColorSelected = true;
    };
    
    // Hide continue text
    window.hideContinueText = function() {
      const continueText = document.getElementById('continue-text');
      if (continueText) {
        continueText.style.display = 'none';
      }
    };

    // Generate SKU with size information
    window.generateSkuWithSize = function(baseSku, size) {
      const sizeSuffix = size ? size.replace(/[^a-zA-Z0-9]/g, '') : '';
      return size ? `${baseSku}_${sizeSuffix}` : baseSku;
    };

    // Generate display name with size
    window.generateDisplayName = function(productName, size) {
      return size ? `${productName} (${size})` : productName;
    };

    // Show order summary (Step 4)
    function showOrderSummary() {
      // Hide the customization steps
      document.getElementById('customization-scroll-container').style.display = 'none';
      document.querySelector('.back-btn').style.display = 'block';
      document.getElementById('next-btn').style.display = 'none';
      
      // Show order summary
      const orderSummary = document.getElementById('order-summary');
      orderSummary.style.display = 'block';
      
      // Show checkout button
      document.getElementById('checkout-btn').style.display = 'block';
      
      // Generate order items
      const orderItemsContainer = document.getElementById('order-items');
      orderItemsContainer.innerHTML = '';
      
      let total = 0;
      
      // Display only user-selected items
      Object.keys(userSelections).forEach(key => {
        const selection = userSelections[key];
        if (selection && selection.product && selection.size) {
          const sizeObj = selection.product.sizes.find(s => s.size === selection.size);
          const price = sizeObj ? sizeObj.price : 0;
          total += price;
          
          // Format price with dot for thousands
          const formattedPrice = Math.floor(price).toLocaleString('ru-RU').replace(/\s/g, '.');
          
          // Determine product type for display
          let productType = '';
          if (key.includes('pillow')) {
            productType = 'НАВОЛОЧКА';
          } else if (key.includes('blanket')) {
            productType = 'ПОДОДЕЯЛЬНИК';
          } else if (key === 'mattress') {
            productType = 'ПРОСТЫНЯ';
          }
          
          const itemElement = document.createElement('div');
          itemElement.className = 'order-item';
          itemElement.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span>${productType} ${selection.product.name} ${selection.size}</span>
              <span style="white-space: nowrap;">${formattedPrice} ₽ <button class="remove-item" data-item="${key}" style="background: none; border: none; cursor: pointer; font-size: 18px; color: #999;">×</button></span>
            </div>
          `;
          orderItemsContainer.appendChild(itemElement);
        }
      });
      
      // Format total with dot for thousands
      const formattedTotal = Math.floor(total).toLocaleString('ru-RU').replace(/\s/g, '.');
      document.getElementById('order-total').innerHTML = `<span>СУММА ЗАКАЗА</span><span>${formattedTotal} ₽</span>`;
      
      // Add event listeners to remove buttons
      document.querySelectorAll('.remove-item').forEach(button => {
        button.addEventListener('click', function() {
          const itemKey = this.getAttribute('data-item');
          removeItemFromOrder(itemKey);
        });
      });
    }

    // Remove item from order
    function removeItemFromOrder(itemKey) {
      // Remove the item from userSelections
      delete userSelections[itemKey];
      
      // Update the image for the removed item to default color
      const currentConfig = window.beddingState?.config || '2-1';
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      // Find the default product (ТОПЛЕНОЕ МОЛОКО)
      const category = itemKey.includes('pillow') ? 'pillows'
                     : itemKey.includes('blanket') ? 'blankets'
                     : itemKey === 'mattress' ? 'mattresses'
                     : null;
      const defaultProduct = category ? products[category].items[0] : null;

      if (defaultProduct) {
        const elementId = itemKey + '-img-' + groupSuffix;
        const container = document.querySelector('.' + elementId);
        if (container) {
          const img = container.querySelector('img');
          if (img) {
            const defaultImageUrl = getImageUrlForElement(defaultProduct, itemKey, currentConfig);
            if (defaultImageUrl) {
              img.src = defaultImageUrl;
            }
          }
        }
      }
      
      // Refresh the order summary
      showOrderSummary();
      
      // Show notification
      // showNotification('Товар удален из заказа');
    }

    initCustomizer();
  });
</script>
