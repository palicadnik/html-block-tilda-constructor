<script>
  // Function to proceed to checkout (make it global for onclick handler and delegation)
  window.proceedToCheckout = function() {
    console.log('proceedToCheckout initiated.');
    console.log('User selections:', userSelections);

    // Check if Tilda cart function is available
    if (typeof tcart__addProduct !== 'function') {
      console.error('Tilda cart function not found. Ensure the cart block is present and loaded');
      showNotification('Ошибка корзины. Обновите страницу.');
      return;
    }

    // Check if any products are selected
    if (Object.keys(userSelections).length === 0) {
      showNotification('Пожалуйста, выберите хотя бы один элемент комплекта');
      return;
    }

    try {
      // Add each selected product to cart
      Object.keys(userSelections).forEach(productKey => {
        const selection = userSelections[productKey];
        if (selection && selection.product && selection.size) {
          const product = selection.product;
          const size = selection.size;

          // Generate final SKU and name with size
          const finalSku = generateSkuWithSize(product.sku, size);
          const displayName = generateDisplayName(product.name, size);

          // Find price for selected size
          const sizeObj = product.sizes.find(s => s.size === size);
          const price = sizeObj ? sizeObj.price : 0;

          console.log(`Adding to cart: ${displayName}, SKU: ${finalSku}, Price: ${price}`);

          // Add to Tilda cart
          tcart__addProduct({
            name: displayName,
            price: price,
            sku: finalSku,
            img: product.picture,
          });
        }
      });

      // Show success message
      showNotification('Выбранные товары добавлены в корзину!');

      // Optional: Open cart automatically after short delay
      setTimeout(() => {
        if (typeof tcart__open === 'function') {
          tcart__open();
        }
      }, 1000);

    } catch (error) {
      console.error('Error adding products to cart:', error);
      showNotification('Ошибка при добавлении в корзину');
    }
  };

        // 3. Ищем кнопку в пути события
        let targetBtn = event.target;
        let foundButton = false;

        // Проверяем сам элемент и его родителей
        while (targetBtn && targetBtn !== document.body) {
          if (targetBtn.classList) {
            // Проверяем все классы элемента
            const classList = Array.from(targetBtn.classList);

            // Ищем кнопку по классу
            if (classList.some(cls => cls.includes('-btn'))) {
              console.log('Найдена кнопка в пути:', classList);
              foundButton = targetBtn;
              break;
            }
          }
          targetBtn = targetBtn.parentElement;
        }

        if (!foundButton) return;

        // Проверяем, не является ли это кнопкой "Назад" или другими кнопками, которые не нужно обрабатывать
        if (foundButton.classList.contains('back-btn') ||
            foundButton.classList.contains('config-btn') ||
            foundButton.classList.contains('next-btn') ||
            foundButton.classList.contains('pillow-count-btn') ||
            foundButton.classList.contains('blanket-count-btn')) {
          // Это одна из специальных кнопок, не обрабатываем её здесь
          return;
        }

        const btnClasses = Array.from(foundButton.classList);
        let elementId = '';

        if (btnClasses.some(c => c.includes('pillow1-btn'))) elementId = 'pillow1';

        else if (btnClasses.some(c => c.includes('blanket2-btn'))) elementId = 'blanket2';
        else if (btnClasses.some(c => c.includes('mattress-btn'))) elementId = 'mattress';

        if (elementId) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          
          console.log(`✅ КЛИК ПРИНЯТ! Элемент: ${elementId}`);

      }

      const buttonsContainer = document.createElement('div');
      buttonsContainer.className = 'size-buttons-container';

      // Создаем кнопки для каждого размера

        const button = document.createElement('button');
        button.className = 'size-button';
        button.textContent = size;
        button.dataset.size = size;
        button.dataset.product = productType;

        // НЕ добавляем класс selected по умолчанию - кнопки должны быть прозрачными

            btn.classList.remove('selected');
          });

          // Добавляем класс selected текущей кнопке
          this.classList.add('selected');

          currentSelections[elementId].size = size;

          // Если это подушка и включен режим "для всех подушек"
          if (elementId.includes('pillow') && window.applyToAllPillows) {
            const pillowCount = parseInt(currentConfig.split('-')[0]);

          // Если это одеяло и включен режим "для всех одеял"
          if (elementId.includes('blanket') && window.applyToAllBlankets) {
            const blanketCount = parseInt(currentConfig.split('-')[1]);
            for (let i = 1; i <= blanketCount; i++) {
              currentSelections[`blanket${i}`].size = size;
            }
          }

          // Показываем уведомление
          showNotification(`Размер выбран: ${size}`);
          
          // Показываем и обновляем текст третьего шага
          const step3Indicator = document.getElementById('step3-indicator');
          step3Indicator.innerHTML = '3. ВЫБЕРИТЕ ЦВЕТ';
          step3Indicator.style.display = 'block';
          
          // Показываем палитру цветов
          document.getElementById('palette-grid').style.display = 'grid';
          
          // Загружаем палитру цветов с фильтрацией по размеру
          loadSwatches();
          
          // Сохраняем в localStorage
          saveToLocalStorage();
          
          console.log(`Size selected for ${elementId}:`, size);
        });

        buttonsContainer.appendChild(button);
      });

      sizeSection.appendChild(buttonsContainer);

      // Показываем секцию
      sizeSection.style.display = 'block';
    }

    // Функция для сохранения в localStorage
    function saveToLocalStorage() {
      localStorage.setItem('beddingSelections', JSON.stringify(currentSelections));
    }

    // Функция для загрузки из localStorage
    function loadFromLocalStorage() {
      const saved = localStorage.getItem('beddingSelections');
      if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(currentSelections, parsed);
        console.log('Loaded from localStorage:', currentSelections);

    // Reset to initial selections (default values)
    function resetToInitial(updateImages) {
      console.log('resetToInitial called, updateImages:', updateImages);
      currentSelections = JSON.parse(JSON.stringify(initialSelections));
      userSelections = {};
      console.log('currentSelections reset:', currentSelections);
      console.log('userSelections reset:', userSelections);

        updateProductImages();
      }

    // Update product images based on current selections
    function updateProductImages() {
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      Object.keys(currentSelections).forEach(key => {
        const elementId = key + '-img-' + groupSuffix;
        const container = document.querySelector('.' + elementId);
        if (container && currentSelections[key].product) {
          const img = container.querySelector('img');
          if (img) {
            img.src = getImageUrlForElement(currentSelections[key].product, key, currentConfig);
          }
        }
      });

    // Show color palette
    function showPalette(elementId) {
      currentCustomizing = elementId;
      loadSwatches();
    }

    // Load swatches for current selection
    function loadSwatches() {
      console.log(`Загрузка цветов для: ${currentCustomizing}`);

      paletteGrid.innerHTML = '';

      if (!currentCustomizing) {
        console.log('Нет выбранного элемента для кастомизации');
        return;
      }

      const productType = currentCustomizing.includes('pillow') ? 'pillows' :
              currentCustomizing.includes('blanket') ? 'blankets' : 'mattresses';

      console.log(`Тип продукта: ${productType}`);

      // Проверяем существование данных
      if (!products[productType]) {
        console.error(`Тип продукта не найден: ${productType}`);
        paletteGrid.innerHTML = '<p>Нет данных для этого типа</p>';
        return;
      }

      // Получаем выбранный размер для текущего элемента
      const selectedSize = currentSelections[currentCustomizing]?.size;
      console.log(`Выбранный размер: ${selectedSize}`);

      // Combine all products from all categories
      let allProducts = [];
      for (const category in products[productType]) {
        allProducts = allProducts.concat(products[productType][category]);
      }

      // Фильтруем продукты по выбранному размеру, если размер выбран
      let filteredProducts = allProducts;
      if (selectedSize) {
        filteredProducts = allProducts.filter(product => {
          return product.sizes && product.sizes.some(sizeObj => sizeObj.size === selectedSize);
        });
        console.log(`Отфильтровано до ${filteredProducts.length} продуктов с размером ${selectedSize}`);
      }

      console.log(`Найдено ${filteredProducts.length} продуктов в ${productType}`);

      if (filteredProducts.length === 0) {
        paletteGrid.innerHTML = '<p>Нет доступных вариантов</p>';
        return;
      }

      filteredProducts.forEach((product, index) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';

        // Используем picture для превью цвета
        if (product.picture) {
          swatch.style.backgroundImage = `url('${product.picture}')`;
          console.log(`Добавлен образец ${index}: ${product.name}, картинка: ${product.picture}`);
        } else {
          console.warn(`Нет картинки для продукта: ${product.name}`);
          swatch.style.backgroundColor = '#ccc'; // Запасной цвет
        }

        swatch.title = product.name;

        // НЕ добавляем класс selected автоматически - выбор происходит только при явном нажатии
        // if (currentSelections[currentCustomizing].product &&
        //         currentSelections[currentCustomizing].product.id === product.id) {
        //   swatch.classList.add('selected');
        // }

        swatch.addEventListener('click', () => {
          console.log(`Клик на образец: ${product.name}`);
          
          // Удаляем класс selected у всех образцов
          paletteGrid.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.remove('selected');
          });
          
          // Добавляем класс selected к текущему образцу
          swatch.classList.add('selected');
          
          selectProduct(product);
        });

        paletteGrid.appendChild(swatch);
      });

      console.log(`Загружено ${filteredProducts.length} образцов`);
    }

    // Select a product
    function selectProduct(product) {
      if (!currentCustomizing) return;

      const currentConfig = window.beddingState?.config || '2-1';
      console.log('Обновляем ВСЕ изображения для:', currentCustomizing);

      // 1. Получаем новый URL
      const newImageUrl = getImageUrlForElement(product, currentCustomizing, currentConfig);
      if (!newImageUrl) {
        console.error('Не удалось получить URL');
        return;
      }

      // 2. Находим ВСЕ элементы, связанные с этим объектом (с учетом конфигурации)
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      const selectors = [
        '.' + currentCustomizing + '-img-' + groupSuffix + ' img', // Основной контейнер с группой
        'img[class*="' + currentCustomizing + '-img-' + groupSuffix + '"]', // Прямо тег img с классом и группой
        '[data-original*="' + currentCustomizing + '"]', // По data-original (без группы, так как это атрибут)
        'img[src*="' + currentCustomizing + '"]' // По src (без группы, так как это атрибут)
      ];

      let updatedCount = 0;
      selectors.forEach(selector => {
        const elements = document.querySelectorAll(selector);
        elements.forEach(el => {
          console.log('Найден элемент для обновления:', el);
          // Меняем src
          if (el.src !== newImageUrl) {
            el.src = newImageUrl;
            updatedCount++;
          }
          // Если есть data-original (для lazy load) - меняем и его
          if (el.dataset.original) {
            el.dataset.original = newImageUrl;
          }
          // Принудительно отключаем lazy loading для надёжности
          el.loading = 'eager';
        });
      });

      // 3. Специальный поиск по data-original (часто используется в Tilda)
      const allImages = document.querySelectorAll('img[data-original]');
      allImages.forEach(img => {
        if (img.dataset.original.includes(currentCustomizing.replace(/\d+$/, ''))) {
          img.src = newImageUrl;
          img.dataset.original = newImageUrl;
          updatedCount++;
        }
      });

      if (updatedCount > 0) {
        currentSelections[currentCustomizing].product = product;
        // Also update user selections
        userSelections[currentCustomizing] = {
          product: product,
          size: currentSelections[currentCustomizing].size
        };
        saveToLocalStorage();
        showNotification('Цвет выбран! Обновлено элементов: ' + updatedCount);
        console.log('Успешно обновлено элементов:', updatedCount);
        
        // Показываем текст и меняем кнопку после первого выбора цвета
        showContinueTextAndUpdateButton();
        
        // 4. Обновляем индикатор шага 3 с информацией о выбранном цвете
        const step3Indicator = document.getElementById('step3-indicator');
        const selectedSize = currentSelections[currentCustomizing]?.size;
        const sizeObj = product.sizes.find(s => s.size === selectedSize);
        const price = sizeObj ? sizeObj.price : (product.sizes.length > 0 ? product.sizes[0].price : 0);
        
        // Форматируем цену с точкой для тысяч
        const formattedPrice = Math.floor(price).toLocaleString('ru-RU').replace(/\s/g, '.');
        
        step3Indicator.innerHTML = `3. ВЫБЕРИТЕ ЦВЕТ: <span class="product-name">${product.name} ${formattedPrice} ₽</span>`;
      } else {
        console.error('Не найдено ни одного изображения для обновления');
        // Диагностика: выведем все изображения
        console.log('Все изображения на странице:', document.querySelectorAll('img'));
      }
    }

// Функция для получения правильного kind
    function getKindForElement(elementName, config) {
      // Разбираем конфигурацию на количество подушек и одеял
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);

      // Для pillow1, pillow2, pillow3, pillow4
      if (elementName.startsWith('pillow')) {
        const pillowNum = parseInt(elementName.replace('pillow', ''));

        if (pillowsCount === 2) {
          // Для конфигураций с 2 подушками
          if (pillowNum === 1) return '1/2';
          if (pillowNum === 2) return '2/2';
        } else if (pillowsCount === 4) {
          // Для конфигураций с 4 подушками
          if (pillowNum <= 4) return `${pillowNum}/4`;
        }
      }
      // Для blanket1, blanket2
      else if (elementName.startsWith('blanket')) {
        const blanketNum = parseInt(elementName.replace('blanket', ''));

        if (blanketsCount === 1) {
          // Одно одеяло в конфигурации
          if (pillowsCount === 2) {
            return '1/1/2'; // Для 2-1 конфигурации
          } else if (pillowsCount === 4) {
            return '1/1/4'; // Для 4-1 конфигурации
          }
        } else if (blanketsCount === 2) {
          // Два одеяла в конфигурации
          if (pillowsCount === 2) {
            return blanketNum === 1 ? '1/2/2' : '2/2/2'; // Для 2-2 конфигурации
          } else if (pillowsCount === 4) {
            return blanketNum === 1 ? '1/2/4' : '2/2/4'; // Для 4-2 конфигурации
          }
        }
      }
      // Для mattress
      else if (elementName === 'mattress') {
        // Для простыней формат kind: y/z, где y - количество одеял, z - количество подушек
        return `${blanketsCount}/${pillowsCount}`;
      }

      console.warn(`Неизвестный kind для ${elementName} в конфигурации ${config}`);
      return '1/2';
    }

// Обновленная функция getImageUrlForElement
    function getImageUrlForElement(product, elementName, config) {
      if (!product || !product.image || !Array.isArray(product.image)) {
        console.error('Продукт или изображения отсутствуют:', product);
        return '';
      }

      const kindToFind = getKindForElement(elementName, config);
      console.log(`Ищем kind "${kindToFind}" для ${elementName} (конфигурация: ${config})`);

      // Сначала ищем точное совпадение
      let imageObj = product.image.find(img => img.kind === kindToFind);

      if (imageObj) {
        console.log(`Найдено точное совпадение: ${imageObj.url.substring(0, 50)}...`);
        return imageObj.url;
      }

      console.warn(`Точное совпадение не найдено. Доступные kind:`, product.image.map(img => img.kind));

      // Если не нашли, ищем по логике
      if (elementName.includes('pillow')) {
        const [pillowsCount] = config.split('-').map(Number);

        // Для 2 подушек
        if (pillowsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            console.log(`Используем изображение для 2 подушек: ${imageObj.kind}`);
            return imageObj.url;
          }
        }
        // Для 4 подушек
        else if (pillowsCount === 4) {
          imageObj = product.image.find(img => img.kind.includes('/4'));
          if (imageObj) {
            console.log(`Используем изображение для 4 подушек: ${imageObj.kind}`);
            return imageObj.url;
          }
        }
      }
      else if (elementName.includes('blanket')) {
        const [, blanketsCount] = config.split('-').map(Number);

        // Для 1 одеяла
        if (blanketsCount === 1) {
          imageObj = product.image.find(img => img.kind === '1/1/2' || img.kind.includes('/2'));
          if (imageObj) {
            console.log(`Используем изображение для 1 одеяла: ${imageObj.kind}`);
            return imageObj.url;
          }
        }
        // Для 2 одеял
        else if (blanketsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            console.log(`Используем изображение для 2 одеял: ${imageObj.kind}`);
            return imageObj.url;
          }
        }
      }
      else if (elementName === 'mattress') {
        // Для простыни ищем по формату y/z, где y - количество одеял, z - количество подушек
        const [pillowsCount, blanketsCount] = config.split('-').map(Number);
        const mattressKind = `${blanketsCount}/${pillowsCount}`;
        imageObj = product.image.find(img => img.kind === mattressKind);
        if (imageObj) {
          console.log(`Используем изображение для простыни: ${imageObj.kind}`);
          return imageObj.url;
        }
        
        // Если не нашли точное совпадение, ищем по количеству подушек
        if (pillowsCount === 2) {
          imageObj = product.image.find(img => img.kind.includes('/2'));
          if (imageObj) {
            console.log(`Используем изображение для простыни с 2 подушками: ${imageObj.kind}`);
            return imageObj.url;
          }
        } else if (pillowsCount === 4) {
          imageObj = product.image.find(img => img.kind.includes('/4'));
          if (imageObj) {
            console.log(`Используем изображение для простыни с 4 подушками: ${imageObj.kind}`);
            return imageObj.url;
          }
        }
      }

      // В крайнем случае берем первое изображение
      if (product.image.length > 0) {
        imageObj = product.image[0];
        console.warn(`Используем первое доступное изображение: ${imageObj.kind}`);
        return imageObj.url;
      }

      console.error('Не удалось найти подходящее изображение');
      return '';
    }

    // Добавим функцию обновления всех изображений при смене конфигурации
    function updateImagesForConfig(config) {
      console.log(`Обновляем изображения для конфигурации ${config}`);

      const [pillowsCount, blanketsCount] = config.split('-').map(Number);

      // Обновляем видимые подушки
      for (let i = 1; i <= 4; i++) {
        const elementName = `pillow${i}`;
        const selection = currentSelections[elementName];

        if (i <= pillowsCount && selection && selection.product) {
          console.log(`Обновляем ${elementName} (подушка ${i}/${pillowsCount})`);
          updateSingleImage(elementName, selection.product, config);
        }
      }

      // Обновляем видимые одеяла
      for (let i = 1; i <= 2; i++) {
        const elementName = `blanket${i}`;
        const selection = currentSelections[elementName];

        if (i <= blanketsCount && selection && selection.product) {
          console.log(`Обновляем ${elementName} (одеяло ${i}/${blanketsCount})`);
          updateSingleImage(elementName, selection.product, config);
        }
      }

      // Обновляем простыню
      if (currentSelections.mattress && currentSelections.mattress.product) {
        console.log('Обновляем mattress');
        updateSingleImage('mattress', currentSelections.mattress.product, config);
      }
    }


// Упрощенная и исправленная функция updateSingleImage для работы с классами Tilda
    function updateSingleImage(elementName, product, config) {
      console.log(`Обновляем изображение для ${elementName}, продукт: ${product.name}, конфигурация: ${config}`);

      // В Tilda классы: pillow1-img-grpXX, pillow2-img-grpXX, blanket1-img-grpXX, blanket2-img-grpXX, mattress-img-grpXX
      // Ищем элемент по точному классу с учетом конфигурации
      const [pillowsCount, blanketsCount] = config.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      const imgElement = document.querySelector(`.${elementName}-img-${groupSuffix}`);

      if (!imgElement) {
        console.error(`Элемент с классом .${elementName}-img-${groupSuffix} не найден!`);

        // Для отладки: выведем все элементы с похожими классами
        const allElements = document.querySelectorAll('[class]');
        const relevantElements = Array.from(allElements).filter(el => {
          return el.className.includes(elementName.replace(/\d+$/, '') + '-img') ||
                  el.className.includes(elementName + '-img');
        });

        console.log(`Найдены похожие элементы:`, relevantElements.map(el => ({
          className: el.className,
          tagName: el.tagName
        })));

        return;
      }

      const imageUrl = getImageUrlForElement(product, elementName, config);

      if (imageUrl && imageUrl !== imgElement.src) {
        console.log(`Устанавливаем новое изображение для ${elementName}: ${imageUrl.substring(0, 50)}...`);

        // Добавляем анимацию перехода
        imgElement.style.transition = 'opacity 0.3s';
        imgElement.style.opacity = '0.7';

        // Создаем новое изображение для предзагрузки
        const newImg = new Image();
        newImg.onload = function() {
          imgElement.src = imageUrl;
          setTimeout(() => {
            imgElement.style.opacity = '1';
          }, 50);
          console.log(`Изображение успешно загружено для ${elementName}`);
        };

        newImg.onerror = function() {
          console.error(`Ошибка загрузки изображения для ${elementName}:`, imageUrl);
          imgElement.style.opacity = '1';

          // Пробуем загрузить запасной вариант
          const fallbackUrl = getFallbackImageUrl(product, elementName, config);
          if (fallbackUrl && fallbackUrl !== imageUrl) {
            console.log(`Пробуем запасной URL: ${fallbackUrl}`);
            imgElement.src = fallbackUrl;
          }
        };

        newImg.src = imageUrl;
      } else if (imageUrl) {
        console.log(`Изображение для ${elementName} уже установлено`);
      } else {
        console.error(`Не удалось получить URL для ${elementName}`);
      }
    }

    // Функция для получения запасного изображения
    function getFallbackImageUrl(product, elementName, config) {
      if (!product || !product.image || !Array.isArray(product.image)) return '';

      // Ищем любое доступное изображение
      const availableImage = product.image.find(img => img.url && !img.url.includes('_.png'));

      if (availableImage) {
        console.log(`Используем запасное изображение с kind=${availableImage.kind}`);
        return availableImage.url;
      }

      // Берем первое изображение, даже если это заглушка
      if (product.image.length > 0 && product.image[0].url) {
        return product.image[0].url;
      }

      return '';
    }

    // Show order summary (Step 4)
    function showOrderSummary() {

      document.getElementById('customization-scroll-container').style.display = 'none';
      document.querySelector('.back-btn').style.display = 'block';
      document.getElementById('next-btn').style.display = 'none';

      orderSummary.style.display = 'block';
      
      // Show checkout button
      document.getElementById('checkout-btn').style.display = 'block';

      orderItemsContainer.innerHTML = '';
      
      let total = 0;
      
      // Display only user-selected items
      Object.keys(userSelections).forEach(key => {
        const selection = userSelections[key];
        if (selection && selection.product && selection.size) {
          const sizeObj = selection.product.sizes.find(s => s.size === selection.size);
          const price = sizeObj ? sizeObj.price : 0;
          total += price;
          
          // Format price with dot for thousands
          const formattedPrice = Math.floor(price).toLocaleString('ru-RU').replace(/\s/g, '.');
          
          // Determine product type for display
          let productType = '';
          if (key.includes('pillow')) {
            productType = 'НАВОЛОЧКА';
          } else if (key.includes('blanket')) {
            productType = 'ПОДОДЕЯЛЬНИК';
          } else if (key === 'mattress') {
            productType = 'ПРОСТЫНЯ';
          }
          
          const itemElement = document.createElement('div');
          itemElement.className = 'order-item';
          itemElement.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span>${productType} ${selection.product.name} ${selection.size}</span>
              <span>${formattedPrice} ₽ <button class="remove-item" data-item="${key}" style="background: none; border: none; cursor: pointer; font-size: 18px; color: #999;">×</button></span>
            </div>
          `;
          orderItemsContainer.appendChild(itemElement);
        }
      });
      
      // Format total with dot for thousands
      const formattedTotal = Math.floor(total).toLocaleString('ru-RU').replace(/\s/g, '.');
      document.getElementById('order-total').innerHTML = `<span>СУММА ЗАКАЗА</span><span>${formattedTotal} ₽</span>`;
      
      // Add event listeners to remove buttons
      document.querySelectorAll('.remove-item').forEach(button => {
        button.addEventListener('click', function() {
          const itemKey = this.getAttribute('data-item');
          removeItemFromOrder(itemKey);
        });
      });
    }

    // Remove item from order
    function removeItemFromOrder(itemKey) {
      // Remove the item from userSelections
      delete userSelections[itemKey];
      
      // Update the image for the removed item to default color
      const currentConfig = window.beddingState?.config || '2-1';
      const [pillowsCount, blanketsCount] = currentConfig.split('-').map(Number);
      let groupSuffix = '';
      if (pillowsCount === 2 && blanketsCount === 1) groupSuffix = 'grp21';
      else if (pillowsCount === 2 && blanketsCount === 2) groupSuffix = 'grp22';
      else if (pillowsCount === 4 && blanketsCount === 1) groupSuffix = 'grp41';
      else if (pillowsCount === 4 && blanketsCount === 2) groupSuffix = 'grp42';

      // Find the default product (ТОПЛЕНОЕ МОЛОКО)
      let defaultProduct = null;
      if (itemKey.includes('pillow')) {
        defaultProduct = products.pillows.solids[0];
      } else if (itemKey.includes('blanket')) {
        defaultProduct = products.blankets.solids[0];
      } else if (itemKey === 'mattress') {
        defaultProduct = products.mattresses.solids[0];
      }

      if (defaultProduct) {
        const elementId = itemKey + '-img-' + groupSuffix;
        const container = document.querySelector('.' + elementId);
        if (container) {
          const img = container.querySelector('img');
          if (img) {
            const defaultImageUrl = getImageUrlForElement(defaultProduct, itemKey, currentConfig);
            if (defaultImageUrl) {
              img.src = defaultImageUrl;
            }
          }
        }
      }
      
      // Refresh the order summary
      showOrderSummary();
      
      // Show notification
      showNotification('Товар удален из заказа');
    }

    initCustomizer();
  });
</script>
